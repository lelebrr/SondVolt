; ============================================================================
; Component Tester PRO v3.0 - Cheap Yellow Display (ESP32-2432S028R)
; Plataforma: PlatformIO + Arduino Framework
; Placa: ESP32-WROOM-32 (Dual Core 240MHz, 520KB RAM, 4MB Flash)
; Display: TFT 2.8" ILI9341 320x240 (ja soldado na placa)
; Touch: XPT2046 Resistivo (ja soldado na placa)
; SD Card: Slot MicroSD (ja soldado na placa, HSPI)
; Audio: Speaker PAM8002 (GPIO 26) integrado
; RGB LED: WS2812B integrado
; ============================================================================

[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino

; --- Monitor Serial ---
monitor_speed = 115200
upload_speed = 921600

; --- Configuracoes de Clock e Flash ---
board_build.f_cpu = 240000000L
board_build.f_cpu_err = 240000000L
board_build.flash_mode = dio
board_build.flash_size = 4MB
board_build.free_heap_size = 520KB

; --- Otimizacoes de Build ---
build_type = release
build_flags =
    -Os
    -DCORE_DEBUG_LEVEL=1
    -Wall
    -Wno-reorder
    -Wno-sign-compare
    -fno-exceptions
    -fno-rtti
    -fno-non-call-exceptions
    -mlongcalls
    -nostdlib
    -Wno-format
    -Wno-unused-parameter
    -Wno-unused-function
    -Wno-unused-variable
    -Wno-comment
    ; ---- Informacoes do Firmware ----
    -DFW_NAME=\"CT_PRO\"
    -DFW_VERSION=\"3.0.0\"
    -DFW_CODENAME=\"CYD_Edition\"
    ; ---- TFT_eSPI: Driver e Resolucao ----
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=240
    ; ---- TFT_eSPI: Pinos do Display (VSPI - fixos na CYD) ----
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_MISO=12
    -DTFT_BL=21
    ; ---- TFT_eSPI: Velocidade SPI ----
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    ; ---- TFT_eSPI: Touch XPT2046 (via Software SPI) ----
    -DTOUCH_CS=33
    -DTOUCH_SCLK=25
    -DTOUCH_MOSI=32
    -DTOUCH_MISO=39
    -DSPI_TOUCH_FREQUENCY=2500000
    ; ---- Fontes ----
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    ; ---- FreeRTOS ----
    -DCONFIG_FREERTOS_HZ=1000
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=4096
    -DCONFIG_ARDUINO_EVENT_RUNNING_CORE=1
    -DCONFIG_ARDUINO_EVENT_TASK_STACK_SIZE=4096
    ; ---- Watchdog Timer ----
    -DCONFIG_ESP_TASK_WDT_TIMEOUT_S=10
    -DCONFIG_ESP_TASK_WDT_CHECK_IDLE_TASK_CPU0=1
    -DCONFIG_ESP_TASK_WDT_CHECK_IDLE_TASK_CPU1=1

; --- Bibliotecas ---
lib_deps =
    ; Display: TFT_eSPI (inclui XPT2046 touch driver)
    bodmer/TFT_eSPI@^2.5.43
    ; Sensores e Perifericos
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.9.2
    adafruit/Adafruit INA219@^1.2.0

; --- Src Filter ---
build_src_filter =
    +<*.cpp>
    +<*.h>
    +<src/*>

; --- Upload (DIO e obrigatorio na CYD) ---
upload_flags =
    --flash_mode dio
    --flash_freq 40m
    --flash_size 4MB
    --partition-table default_csv

; --- Partition Table ---
board_build.partitions = default.csv

; --- Variaveis customizadas (platformio.ini) ---
; [EXTRA]
; -DUSE_SERIAL_DEBUG=1
; -DUSE_FREERTOS=1