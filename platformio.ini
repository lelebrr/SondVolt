; ============================================================================
; Component Tester PRO v3.0 — Cheap Yellow Display (ESP32-2432S028R)
; ============================================================================
; Placa: ESP32-WROOM-32 (Dual Core 240MHz, 520KB RAM, 4MB Flash)
; Display: TFT 2.8" ILI9341 320x240 (já soldado na placa)
; Touch: XPT2046 Resistivo (já soldado na placa)
; SD Card: Slot MicroSD (já soldado na placa, HSPI)
; ============================================================================

[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino

; --- Frequência e Upload ---
monitor_speed = 115200
upload_speed = 921600
board_build.f_cpu = 240000000L
board_build.flash_mode = dio

; --- Build Flags ---
; Configuração do TFT_eSPI inline (sem precisar editar User_Setup.h manualmente)
build_flags = 
    -Os
    -DCORE_DEBUG_LEVEL=1
    -w
    ; ---- TFT_eSPI: Driver e Resolução ----
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    ; ---- TFT_eSPI: Pinos do Display (VSPI — fixos na CYD) ----
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_MISO=12
    -DTFT_BL=21
    ; ---- TFT_eSPI: Velocidade SPI ----
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    ; ---- TFT_eSPI: Touch XPT2046 ----
    -DTOUCH_CS=33
    -DTOUCH_SCLK=25
    -DTOUCH_MOSI=32
    -DTOUCH_MISO=39
    -DSPI_TOUCH_FREQUENCY=2500000
    ; ---- Suporte a fontes ----
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1

; --- Bibliotecas ---
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    paulstoffregen/OneWire @ ^2.3.8
    adafruit/Adafruit INA219 @ ^1.2.3
    adafruit/Adafruit BusIO @ ^1.16.2
    Wire
