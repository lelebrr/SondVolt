; ============================================================================
; Sondvolt v3.0 — Cheap Yellow Display (ESP32-2432S028R)
; OTIMIZADO PARA MÁXIMA PERFORMANCE
; ============================================================================
; Placa: ESP32-WROOM-32 (Dual Core 240MHz, 520KB RAM, 4MB Flash)
; Display: TFT 2.8" ILI9341 320x240 (já soldado na placa)
; Touch: XPT2046 Resistivo (já soldado na placa)
; SD Card: Slot MicroSD (já soldado na placa)
; ============================================================================

[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600

; CPU e Flash otimizados
board_build.f_cpu = 240000000L
board_build.f_flash = 40000000L
board_build.flash_mode = dio
board_build.flash_size = 4MB
board_build.speed = 240mhz

; Particionamento otimizado para máximo app space (470KB)
; OTA: 0x14000 (80KB) x2, SPIFFS: 0x37000 (221KB), FAT: 0x60000 (376KB)
board_build.partitions = huge_app.csv

build_type = release

; OTIMIZAÇÕES DE COMPILAÇÃO MAXIMAS
build_flags =
    ; ---- Otimizacoes de tamanho e velocidade ----
    -Os
    -ffunction-sections
    -fdata-sections
    -finline-functions
    -finline-limit=32
    -fno-common
    -mlongcalls
    ; Desativa exceptions e RTTI (economiza ~80KB)
    -fno-exceptions
    ; ---- Warnings desativados ----
    -Wall
    -Wno-sign-compare
    -Wno-format
    -Wno-unused-parameter
    -Wno-unused-function
    -Wno-unused-variable
    -Wno-comment
    -Wno-missing-field-initializers
    -Wno-deprecated-enum-enum-conversion
    ; ---- Debug nível mínimo ----
    -DCORE_DEBUG_LEVEL=0
    ; ---- TFT_eSPI config ----
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_ROTATION=1
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_MISO=12
    -DTFT_BL=21
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DTOUCH_CS=33
    -DTOUCH_SCLK=25
    -DTOUCH_MOSI=32
    -DTOUCH_MISO=39
    ; ---- Fontes compactas ----
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    ; ---- OTAs ----
    -DUSE_HSPI_FOR_SD=1
    -DESP32_SPI_FLASH
    ; ---- Watchdog Timer ----
    -DCONFIG_ESP_TASK_WDT_TIMEOUT_S=10
    -DCONFIG_ESP_TASK_WDT_CHECK_IDLE_TASK_CPU0=1
    -DCONFIG_ESP_TASK_WDT_CHECK_IDLE_TASK_CPU1=1

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.9.2
    adafruit/Adafruit INA219@^1.2.0

build_src_filter =
    +<*>
    +<../src/*.cpp>
    +<../src/*.h>
